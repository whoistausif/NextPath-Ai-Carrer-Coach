version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nextpath-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=5000
      - JWT_SECRET=ai_career_coach_jwt_secret_key_2026
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  frontend:
    build: ./frontend
    container_name: nextpath-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always
